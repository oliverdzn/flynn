<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d799"/>
      <stop offset="50%" stop-color="#d4a94f"/>
      <stop offset="100%" stop-color="#f5d799"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd1e3"/>
      <stop offset="100%" stop-color="#ff9ec4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#b5762f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Butterfly reusable symbol -->
  <g id="butterfly-def"></g>

  <!-- ===== OUTER DECORATIVE BORDER ===== -->
  <rect x="18" y="18" width="1044" height="1044" rx="36" fill="none" stroke="url(#goldGrad)" stroke-width="10"/>
  <rect x="34" y="34" width="1012" height="1012" rx="28" fill="none" stroke="#ff9ec4" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>

  <!-- corner flourishes (simple gold swirl dots) -->
  <g fill="#d4a94f" opacity="0.85">
    <circle cx="60" cy="60" r="6"/>
    <circle cx="80" cy="46" r="4"/>
    <circle cx="46" cy="80" r="4"/>

    <circle cx="60" cy="1020" r="6"/>
    <circle cx="80" cy="1034" r="4"/>
    <circle cx="46" cy="1000" r="4"/>

    <circle cx="1020" cy="1020" r="6"/>
    <circle cx="1000" cy="1034" r="4"/>
    <circle cx="1034" cy="1000" r="4"/>
  </g>

  <!-- ===== BUTTERFLIES (top corners) ===== -->
  <!-- Butterfly template: two upper wings, two lower wings, body -->

  <!-- Top-left butterfly -->
  <g transform="translate(120,95) rotate(-18) scale(1.05)" filter="url(#softShadow)">
    <ellipse cx="-16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(-25 -16 -14)"/>
    <ellipse cx="16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(25 16 -14)"/>
    <ellipse cx="-11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(-15 -11 14)"/>
    <ellipse cx="11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(15 11 14)"/>
    <circle cx="-16" cy="-14" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="16" cy="-14" r="4" fill="#ffffff" opacity="0.7"/>
    <rect x="-2.5" y="-22" width="5" height="40" rx="2.5" fill="#c98a4b"/>
    <path d="M -2 -22 Q -10 -32 -14 -30" stroke="#c98a4b" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 2 -22 Q 10 -32 14 -30" stroke="#c98a4b" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Small butterfly bottom-left -->
  <g transform="translate(110,955) rotate(12) scale(0.75)" filter="url(#softShadow)">
    <ellipse cx="-16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(-25 -16 -14)"/>
    <ellipse cx="16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(25 16 -14)"/>
    <ellipse cx="-11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(-15 -11 14)"/>
    <ellipse cx="11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(15 11 14)"/>
    <rect x="-2.5" y="-22" width="5" height="40" rx="2.5" fill="#c98a4b"/>
  </g>

  <!-- Small butterfly bottom-right -->
  <g transform="translate(970,955) rotate(-12) scale(0.75)" filter="url(#softShadow)">
    <ellipse cx="-16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(-25 -16 -14)"/>
    <ellipse cx="16" cy="-14" rx="17" ry="24" fill="url(#pinkGrad)" transform="rotate(25 16 -14)"/>
    <ellipse cx="-11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(-15 -11 14)"/>
    <ellipse cx="11" cy="14" rx="11" ry="15" fill="#ffe1ee" transform="rotate(15 11 14)"/>
    <rect x="-2.5" y="-22" width="5" height="40" rx="2.5" fill="#c98a4b"/>
  </g>

  <!-- tiny sparkle dots scattered -->
  <g fill="#f7c4d9" opacity="0.9">
    <circle cx="200" cy="140" r="3"/>
    <circle cx="880" cy="140" r="3"/>
    <circle cx="150" cy="900" r="3"/>
    <circle cx="930" cy="900" r="3"/>
  </g>

  <!-- ===== TOP TEXT BANNER (shifted left to make room for photo) ===== -->
  <g filter="url(#softShadow)">
    <rect x="66" y="60" width="770" height="118" rx="24" fill="#fff5f8" stroke="url(#goldGrad)" stroke-width="4" opacity="0.96"/>
  </g>
  <text x="451" y="104" text-anchor="middle" font-family="Poppins, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#c9648e" letter-spacing="4">1ST BIRTHDAY</text>
  <text x="451" y="152" text-anchor="middle" font-family="Poppins, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#b5762f">Olivia Flynn Dizon</text>

  <!-- ===== PHOTO MEDALLION (upper right, in line with name; photo pasted in via compositing) ===== -->
  <g filter="url(#softShadow)">
    <circle cx="955" cy="119" r="78" fill="none" stroke="url(#goldGrad)" stroke-width="8"/>
    <circle cx="955" cy="119" r="78" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- ===== BOTTOM TEXT BANNER ===== -->
  <g filter="url(#softShadow)">
    <rect x="330" y="900" width="420" height="86" rx="22" fill="#fff5f8" stroke="url(#goldGrad)" stroke-width="4" opacity="0.96"/>
  </g>
  <text x="540" y="954" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#c9648e" letter-spacing="1">July 12, 2026</text>

</svg>
